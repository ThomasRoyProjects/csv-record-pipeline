workflow: custom_job

# Safe public demo:
# Map intentionally non-canonical source headers into canonical fields,
# then run a custom stage-sequence match job against the shipped reference file.
# Expected outcome with the shipped demo data:
# - 600 confident matches
# - 50 review records
# - 350 unmatched records

inputs:
  primary:
    path: demo_data/demo_random_import.csv
    columns:
      person_id: ExternalID
      first_name: GivenName
      middle_name: MiddleInitial
      last_name: Surname
      primary_address1: StreetLine
      primary_address2: UnitNo
      mail_city: Town
      mail_state: ProvinceCode
      mail_zip: Postal
      email: EmailAddress
      phone: MobilePhone
      membership_end_date: ExpiryLabel
  reference:
    path: demo_data/demo_match_reference.csv
    columns:
      person_id: userID
      first_name: first_name
      middle_name: middle_name
      last_name: last_name
      primary_address1: FullResidentialAddress
      primary_address2: primary_address2
      primary_city: primary_city
      primary_state: primary_state
      primary_zip: primary_zip
      email: email
      phone: PhoneNumber

stage_sequence:
  - name: normalize_addresses
    config:
      dataset_role: primary
      mode: member
      address1_col: primary_address1
      address2_col: primary_address2
      city_col: mail_city
      state_col: mail_state
      zip_col: mail_zip
  - name: normalize_addresses
    config:
      dataset_role: reference
      mode: voter
      address1_col: primary_address1
      address2_col: primary_address2
      city_col: primary_city
      state_col: primary_state
      zip_col: primary_zip
  - name: match_records
    config:
      primary_role: primary
      reference_role: reference
      match_config:
        primary_id_col: person_id
        reference_id_col: person_id
        primary_first_col: first_name
        reference_first_col: first_name
        primary_last_col: last_name
        reference_last_col: last_name
        primary_address_col: _address_norm
        reference_address_col: _address_norm
        primary_address1_col: primary_address1
        reference_address1_col: primary_address1
        primary_address2_col: primary_address2
        reference_address2_col: primary_address2
        primary_email_col: email
        reference_email_col: email
        primary_phone_col: phone
        reference_phone_col: phone
        confident_threshold: 160
        possible_threshold: 120
        review_threshold: 85
        strict_mode: false
  - name: write_records_bundle
    config:
      dataset_role: primary
      base_dir: output/demo_random_custom_job
      outputs:
        matched_records:
          match_status: CONFIDENT
          filename: matched_records.csv
        review_records:
          match_status:
            - POSSIBLE
            - REVIEW
          filename: review_records.csv
        unmatched_records:
          match_status: UNMATCHED
          filename: unmatched_records.csv

outputs:
  records:
    base_dir: output/demo_random_custom_job
