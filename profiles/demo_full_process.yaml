profile: process_full_records

description: >
  Safe public demo of the heavier full-process preset using shipped synthetic member-style input
  plus the shipped synthetic reference file. Expected outcome: one deduped processed export with
  matching, address classification, aggregated contacts, and priority scoring applied.

inputs:
  primary:
    paths:
      - demo_data/demo_process_members.csv
    columns:
      person_id: person_id
      first_name: first_name
      middle_name: middle_name
      last_name: last_name
      primary_address1: primary_address1
      primary_address2: primary_address2
      mail_city: mail_city
      mail_state: mail_state
      mail_zip: mail_zip
      email: email
      phone: phone_number
      memb_start_date: memb_start_date
      memb_exp_date: memb_exp_date

  reference:
    paths:
      - demo_data/demo_match_reference.csv
    columns:
      person_id: userID
      first_name: first_name
      middle_name: middle_name
      last_name: last_name
      primary_address1: FullResidentialAddress
      primary_address2: primary_address2
      primary_city: primary_city
      primary_state: primary_state
      primary_zip: primary_zip
      email: email
      phone: PhoneNumber

stages:
  normalize: true
  dedupe: true
  reconcile: true
  classify_address_status: true
  enrich_contacts: true
  score_priority: true

match:
  primary_id_col: person_id
  reference_id_col: person_id
  primary_first_col: first_name
  reference_first_col: first_name
  primary_last_col: last_name
  reference_last_col: last_name
  primary_address_col: _address_norm
  reference_address_col: _address_norm
  primary_address1_col: primary_address1
  reference_address1_col: primary_address1
  primary_address2_col: primary_address2
  reference_address2_col: primary_address2
  primary_email_col: email
  reference_email_col: email
  primary_phone_col: phone
  reference_phone_col: phone
  confident_threshold: 160
  possible_threshold: 120
  review_threshold: 85
  strict_mode: false

outputs:
  records:
    path: output/demo_full_process.csv
